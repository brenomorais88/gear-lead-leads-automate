services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gear-lead-engine-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-3000}
      KTOR_DEPLOYMENT_PORT: ${APP_PORT:-3000}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/lead-engine.db}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gear-lead-engine-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:${APP_PORT:-3000}
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - tunnel
