services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gear-lead-engine-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: "3000"
      KTOR_DEPLOYMENT_PORT: "3000"
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/lead-engine.db}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
