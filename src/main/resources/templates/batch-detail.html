<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{base :: head}"></head>
<body>
<header th:replace="~{base :: header}"></header>
<nav th:replace="~{base :: nav}"></nav>
<main class="batch-detail-main">
    <section>
        <h1 th:text="${title}">Lote</h1>

        <dl class="batch-meta" th:if="${batch != null}">
            <div><dt>ID</dt><dd th:text="${batch.id}">0</dd></div>
            <div><dt>Criado em</dt><dd th:text="${batch.createdAt}">-</dd></div>
            <div><dt>Total no lote</dt><dd th:text="${batch.totalLeads}">0</dd></div>
        </dl>

        <div class="table-wrap" th:if="${leads != null and !leads.isEmpty()}">
            <table class="preview-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Cidade / UF</th>
                    <th>Telefone (WhatsApp)</th>
                    <th>Score</th>
                    <th>Prioridade</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lead : ${leads}">
                    <td th:text="${lead.id}">0</td>
                    <td th:text="${lead.nomeFantasia != null and not lead.nomeFantasia.isEmpty() ? lead.nomeFantasia : lead.razaoSocial}">-</td>
                    <td>
                        <span th:text="${lead.cidade}">-</span>
                        <span th:if="${lead.cidade != null and not lead.cidade.isEmpty() and lead.estado != null and not lead.estado.isEmpty()}"> / </span>
                        <span th:text="${lead.estado}"></span>
                    </td>
                    <td th:text="${lead.telefoneNormalizado}">-</td>
                    <td th:text="${lead.score}">0</td>
                    <td th:text="${lead.prioridade}">-</td>
                    <td th:text="${lead.status}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
        <p th:if="${leads == null or leads.isEmpty()}">Nenhum lead neste lote.</p>
    </section>
</main>
</body>
</html>
