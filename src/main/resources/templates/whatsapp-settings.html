<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{base :: head}"></head>
<body>
<header th:replace="~{base :: header}"></header>
<nav th:replace="~{base :: nav}"></nav>
<th:block th:replace="~{base :: wa-engine-strip}"/>
<main class="whatsapp-config-main">
    <section>
        <h1 th:text="${title}">Configurações WhatsApp</h1>
        <p class="muted">Valores operacionais ficam no banco; token e URL da API permanecem no ambiente (.env).</p>

        <p id="wa-cfg-flash" class="flash-msg" hidden></p>

        <h2 class="dashboard-section-title">Estado do disparo</h2>
        <p id="wa-cfg-service-line">Carregando…</p>
        <p>
            <button type="button" id="wa-cfg-pause" class="button button-secondary">Pausar serviço</button>
            <button type="button" id="wa-cfg-resume" class="button button-secondary">Retomar serviço</button>
        </p>

        <h2 class="dashboard-section-title">Parâmetros</h2>
        <form id="wa-cfg-form" class="wa-cfg-form">
            <label>Phone Number ID
                <input type="text" name="phoneNumberId" id="wa-cfg-phone" required autocomplete="off"/>
            </label>
            <label>Template padrão
                <input type="text" name="defaultTemplateName" id="wa-cfg-tpl" required autocomplete="off"/>
            </label>
            <label>Idioma do template
                <input type="text" name="defaultTemplateLanguage" id="wa-cfg-lang" required autocomplete="off" placeholder="ex.: pt_BR"/>
            </label>
            <label>Limite diário de envios
                <input type="number" name="dailySendLimit" id="wa-cfg-limit" min="1" step="1" required/>
            </label>
            <label>Delay mínimo entre envios (minutos)
                <input type="number" name="sendDelayMinMinutes" id="wa-cfg-dmin" min="0" step="1" required/>
            </label>
            <label>Delay máximo entre envios (minutos)
                <input type="number" name="sendDelayMaxMinutes" id="wa-cfg-dmax" min="0" step="1" required/>
            </label>
            <p>
                <button type="submit" class="button">Salvar</button>
            </p>
        </form>
    </section>
</main>
<script src="/static/whatsapp-settings-page.js" defer></script>
</body>
</html>
