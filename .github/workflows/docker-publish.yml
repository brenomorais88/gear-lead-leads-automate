name: Build and push Docker image

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: img
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.ref_name }}
            ${{ steps.img.outputs.image }}:sha-${{ github.sha }}

  deploy-prod:
    name: Deploy to server (main)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Evita appleboy/ssh-action: ele baixa drone-ssh do GitHub Releases e pode falhar com 504 intermitente.
      - name: Deploy and verify health over SSH (native)
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "DEPLOY_PATH não definido (GitHub Secret)." >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY não definidos (GitHub Secrets)." >&2
            exit 1
          fi
          if [ -z "${GHCR_USER:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "GHCR_USER/GHCR_TOKEN não definidos (GitHub Secrets)." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/gear_deploy_key
          chmod 600 ~/.ssh/gear_deploy_key

          IMAGE_REPO_LC="$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${IMAGE_REPO_LC}:${IMAGE_TAG}"

          REMOTE_SCRIPT="${GITHUB_WORKSPACE}/scripts/gha-remote-deploy.sh"
          if [ ! -f "${REMOTE_SCRIPT}" ]; then
            echo "Script remoto não encontrado: ${REMOTE_SCRIPT}" >&2
            exit 1
          fi

          {
            printf 'export IMAGE=%q\n' "${IMAGE}"
            printf 'export GHCR_USER=%q\n' "${GHCR_USER}"
            printf 'export GHCR_TOKEN=%q\n' "${GHCR_TOKEN}"
            printf 'export DEPLOY_PATH=%q\n' "${DEPLOY_PATH}"
            printf 'export APP_PORT_GH=%q\n' "${APP_PORT:-}"
            printf 'export PUBLIC_HOST_GH=%q\n' "${PUBLIC_HOST:-}"
            cat "${REMOTE_SCRIPT}"
          } | ssh -i ~/.ssh/gear_deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            bash -s

          rm -f ~/.ssh/gear_deploy_key
