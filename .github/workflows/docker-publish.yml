name: Build and push Docker image

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: img
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.ref_name }}
            ${{ steps.img.outputs.image }}:sha-${{ github.sha }}

  deploy-prod:
    name: Deploy to server (main)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy and verify health over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: IMAGE_REPO,IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH,APP_PORT,PUBLIC_HOST
          script: |
            set -euo pipefail

            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH não definido (GitHub Secret)." >&2
              exit 1
            fi
            if [ -z "${GHCR_USER:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "GHCR_USER/GHCR_TOKEN não definidos (GitHub Secrets)." >&2
              exit 1
            fi

            IMAGE_REPO_LC="$(echo "${IMAGE_REPO}" | tr '[:upper:]' '[:lower:]')"
            IMAGE="${IMAGE_REPO_LC}:${IMAGE_TAG}"
            cd "${DEPLOY_PATH}"

            echo "DEPLOY_PATH=${DEPLOY_PATH}"
            ls -la "${DEPLOY_PATH}" || true

            if [ ! -f ".env" ]; then
              echo "Arquivo .env não encontrado em ${DEPLOY_PATH}" >&2
              exit 1
            fi
            if [ ! -f "docker-compose.deploy.yml" ]; then
              echo "docker-compose.deploy.yml não encontrado em ${DEPLOY_PATH}" >&2
              exit 1
            fi

            if grep -q '^DEPLOY_IMAGE=' .env; then
              sed -i.bak "s|^DEPLOY_IMAGE=.*$|DEPLOY_IMAGE=${IMAGE}|" .env
            else
              echo "DEPLOY_IMAGE=${IMAGE}" >> .env
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            COMPOSE_FILES="-f docker-compose.deploy.yml"
            COMPOSE_PROFILES=""
            if [ -n "${PUBLIC_HOST:-}" ] && [ -f "docker-compose.caddy.yml" ]; then
              COMPOSE_FILES="${COMPOSE_FILES} -f docker-compose.caddy.yml"
              COMPOSE_PROFILES="--profile https"
            fi

            # shellcheck disable=SC2086
            docker compose ${COMPOSE_FILES} ${COMPOSE_PROFILES} pull app
            # shellcheck disable=SC2086
            docker compose ${COMPOSE_FILES} ${COMPOSE_PROFILES} up -d

            APP_PORT_VAL="${APP_PORT:-$(grep -E '^APP_PORT=' .env | head -n1 | cut -d'=' -f2)}"
            APP_PORT_VAL="${APP_PORT_VAL:-3000}"

            # Confirma que o container está com a imagem esperada.
            APPLIED_IMAGE="$(docker inspect -f '{{.Config.Image}}' gear-lead-engine-app)"
            echo "Imagem aplicada no container: ${APPLIED_IMAGE}"
            if [ "${APPLIED_IMAGE}" != "${IMAGE}" ]; then
              echo "Imagem aplicada difere da esperada. Esperado: ${IMAGE}" >&2
              exit 1
            fi

            # Healthcheck interno com tentativas.
            ok=0
            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${APP_PORT_VAL}/health" >/dev/null; then
                ok=1
                break
              fi
              sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              echo "Healthcheck HTTP interno falhou em http://127.0.0.1:${APP_PORT_VAL}/health" >&2
              # shellcheck disable=SC2086
              docker compose ${COMPOSE_FILES} ${COMPOSE_PROFILES} ps
              # shellcheck disable=SC2086
              docker compose ${COMPOSE_FILES} ${COMPOSE_PROFILES} logs --tail=120 app
              exit 1
            fi
            echo "Healthcheck interno OK."

            # Se PUBLIC_HOST estiver configurado, valida HTTPS externo também.
            if [ -n "${PUBLIC_HOST:-}" ]; then
              ok_ext=0
              for i in $(seq 1 20); do
                if curl -fsS "https://${PUBLIC_HOST}/health" >/dev/null; then
                  ok_ext=1
                  break
                fi
                sleep 3
              done
              if [ "$ok_ext" -ne 1 ]; then
                echo "Healthcheck HTTPS externo falhou em https://${PUBLIC_HOST}/health" >&2
                exit 1
              fi
              echo "Healthcheck HTTPS externo OK."
            fi
